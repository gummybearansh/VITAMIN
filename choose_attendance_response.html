	    	<script type="text/javascript">
	    	
			   	function showMessage(messageType, messageText)
			   	{
			   		var messageTitle = "", messageTextType = "";
			   		if ((messageText != null) && (messageText != "") && (messageText.trim().length > 0))
					{
				   		switch (parseInt(messageType))
				   		{
					   	  	case 1:
					   	  		messageTitle = "Error....!";
				   				messageTextType = "text-danger";
					   	    	break;
					   	 	case 2:
					   			messageTitle = "Success....!";
					   			messageTextType = "text-success";
					   	    	break;
					   	    default:
					   	    	messageTitle = "Info....!";
				   				messageTextType = "text-dark";
					   	    	break;
					   	}
				   		
						new ConfirmBox().withParameters({
							title : messageTitle,
			                textMessage : messageText,
			                textCss : [messageTextType, "fw-bold"],
			                keepOpen: false,
			            }).showText();
					}
			   	}
	    	
	    		function showAndClearMessage(messageType, inputId)
	    		{
	    			if ((inputId != null) && (inputId != ""))
					{
		    			var onloadMessage = document.getElementById(inputId).value;
			    		document.getElementById(inputId).value = "";
			    		showMessage(messageType, onloadMessage);
					}
	    		}
	    		
	    		function showMessageAndFocusInput(inputId, messageText)
	    		{	
			   		if ((typeof inputId != "undefined") && (inputId != null) && (inputId != "") && (inputId.trim().length > 0) 
			   				&& (messageText != null) && (messageText != "") && (messageText.trim().length > 0))
					{
			   			var inputType = document.getElementById(inputId).type;
				   						   		
						new ConfirmBox().withParameters({
							title : "Info....!",
			                textMessage : messageText,
			                textCss : ["text-danger", "fw-bold"],
			                onClose: function () {
			                	switch (inputType)
						   		{
							   	  	case "select-one":
							   	 	case "checkbox":
							   	 	case "radio":
							   	  		document.getElementById(inputId).focus();
						   	    		break;
						   	    		
							   	    default:							   	    	
							   	    	document.getElementById(inputId).select();
							   	  		document.getElementById(inputId).focus();
							   	    	break;
							   	}
				            },
			            }).showText();
					}
	    		}
	    		
	    		function callScrollTop()
	    		{
	    			window.scrollTo(0, 0);
	    		}
	    		
	    		function validateIPAddress(ipAddress)
				{
					var ipformat = /^(25[0-5]|2[0-4][0-9]|[01]?[0-9][0-9]?)\.(25[0-5]|2[0-4][0-9]|[01]?[0-9][0-9]?)\.(25[0-5]|2[0-4][0-9]|[01]?[0-9][0-9]?)\.(25[0-5]|2[0-4][0-9]|[01]?[0-9][0-9]?)$/;
				 	if (ipAddress.match(ipformat))
				 	{
				 		return true;
					}
					else
					{
				 		return false;
				 	}
				}				
						
				function textCounter(field, countfield, maxlimit)
				{
					if (field.value.length > maxlimit)
					{
						field.value = field.value.substring(0, maxlimit);
						field.blur();
						field.focus();
						return false;
					}
					else
					{
						countfield.value = maxlimit	- field.value.length;
					}
				}
	    		
				function formatDateWithMonthShortName(inputDate)
				{
					if ((inputDate != null) && (inputDate != ""))
					{
		            	var dateParts = inputDate.split('-');
		            	var parsedDate = new Date(dateParts[2], dateParts[1] - 1, dateParts[0]);
		                
		            	if (!isNaN(parsedDate))
		                {
			            	return parsedDate.getDate().toString().padStart(2, '0') 
			                			+'-'+ getMonthShortAbbreviation(parsedDate.getMonth()) 
			                    		+'-'+ parsedDate.getFullYear();
						}
		                else
		                {
		                	return "";
		                }
					}
					else
					{
						return "";
					}
                }

                function getMonthShortAbbreviation(monthIndex)
                {
                    var months = ["Jan", "Feb", "Mar", "Apr", "May", "Jun", "Jul", "Aug", "Sep", "Oct", "Nov", "Dec"];                    
                    return months[monthIndex];
                }
                
                function showMessageAndFocusInputByName(inputName, messageText, index)
	    		{	
			   		if ((inputName != null) && (inputName != "") 			   				
			   				&& (messageText != null) && (messageText.trim() != "") 
			   				&& (index != null) && (!isNaN(index)))
					{
			   			var inputNameArray = new Array();
			   			inputNameArray = document.getElementsByName(inputName);
			   			
						new ConfirmBox().withParameters({
							title : "Info....!",
				            textMessage : messageText,
				            textCss : ["text-danger", "fw-bold"],
				            onClose: function () {
				               	switch (inputNameArray[index].type)
						   		{
							   	  	case "select-one":
							   	 	case "checkbox":
							   	 	case "radio":
							   	 		inputNameArray[index].focus();
						   	    		break;
						   	    		
							   	    default:							   	    	
							   	    	inputNameArray[index].select();
							   			inputNameArray[index].focus();
							   	    	break;
							   	}
					    	},
				       	}).showText();						
					}
	    		}
                
                function getTimeStampForDownload()
                {
                	var now = new Date();
    				var timeStamp = now.getFullYear() 
    									+"-"+ ((now.getMonth() < 10) ? "0"+ now.getMonth() : now.getMonth()) 
    									+"-"+ ((now.getDate() < 10) ? "0"+ now.getDate() : now.getDate())
    									+"_"+ ((now.getHours() < 10) ? "0"+ now.getHours() : now.getHours()) 
    									+"-"+ ((now.getMinutes() < 10) ? "0"+ now.getMinutes() : now.getMinutes())
    									+"-"+ ((now.getSeconds() < 10) ? "0"+ now.getSeconds() : now.getSeconds());
    				
    				return timeStamp;
                }
